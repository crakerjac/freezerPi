<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IceboxHero  v{{ version }}</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <style>
        body            { font-family: Arial, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; }
        h1              { margin-bottom: 20px; }
        .grid           { display: flex; gap: 20px; margin-bottom: 30px; }
        .card           { background-color: #1e1e1e; padding: 20px; border-radius: 8px; flex: 1; text-align: center; }
        .temp           { font-size: 4em; font-weight: bold; margin: 10px 0; }
        .status-normal  { color: #4caf50; }
        .status-warning { color: #ffeb3b; }
        .status-critical{ color: #f44336; }
        .chart-container{ background-color: #1e1e1e; padding: 20px; border-radius: 8px; height: 400px; }
        .footer         { margin-top: 30px; text-align: center; font-size: 0.75em; color: #555; }
        .watchdog       { margin-left: 14px; }
        .wd-active      { color: #4caf50; }
        .wd-inactive    { color: #f44336; }
        .wd-unknown     { color: #666; }
        .system-panel   { background-color: #1e1e1e; border-radius: 8px; margin-top: 20px; overflow: hidden; }
        .system-toggle  { width: 100%; background: none; border: none; color: #888; font-size: 0.8em;
                          padding: 10px 20px; text-align: left; cursor: pointer; display: flex;
                          justify-content: space-between; align-items: center; }
        .system-toggle:hover { color: #aaa; }
        .system-body    { display: none; padding: 12px 20px 16px; }
        .system-body.open { display: block; }
        .system-grid    { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
        .stat           { text-align: center; }
        .stat-label     { font-size: 0.7em; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value     { font-size: 1.1em; color: #ccc; margin-top: 2px; }
        .stat-warn      { color: #ffeb3b; }
        .stat-crit      { color: #f44336; }

        @media (max-width: 768px) {
            body            { padding: 12px; }
            .grid           { flex-direction: column; gap: 15px; }
            .temp           { font-size: 3.5em; }
            .chart-container{ height: 250px; padding: 12px; }
        }
    </style>
    <!-- Chart.js must be downloaded and placed at static/chart.min.js — no CDN used -->
    <script src="/static/chart.min.js"></script>
</head>
<body>

<h1>Freezer Status</h1>

<div class="grid" id="sensor-cards"></div>

<div class="chart-container">
    <canvas id="historyChart"></canvas>
</div>

<div class="system-panel">
    <button class="system-toggle" onclick="toggleSystem(this)">
        <span>System</span><span id="system-arrow">&#9660;</span>
    </button>
    <div class="system-body" id="system-body">
        <div class="system-grid" id="system-grid">
            <div class="stat"><div class="stat-label">IPC Age</div><div class="stat-value" id="st-ipc">—</div></div>
            <div class="stat"><div class="stat-label">Last SD Backup</div><div class="stat-value" id="st-backup">—</div></div>
            <div class="stat"><div class="stat-label">/data Used</div><div class="stat-value" id="st-disk">—</div></div>
            <div class="stat"><div class="stat-label">Uptime</div><div class="stat-value" id="st-uptime">—</div></div>
            <div class="stat"><div class="stat-label">Pi CPU Temp</div><div class="stat-value" id="st-cputemp">—</div></div>
        </div>
    </div>
</div>

<div class="footer">
    <span id="watchdog-status" class="watchdog wd-unknown">&#9679; Watchdog: checking...</span>
</div>

<script>
    let historyChart = null;

    // Thresholds injected from config.ini via Jinja2 — no hardcoding required
    const tempWarning  = {{ warning }};
    const tempCritical = {{ critical }};

    function updateCurrentTemps() {
        fetch('/api/current')
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('sensor-cards');
                container.innerHTML = '';

                if (data.error && Object.keys(data.sensors).length === 0) {
                    container.innerHTML = `<div class="card"><h3>Status</h3><div class="temp">${data.error}</div></div>`;
                } else {
                    Object.keys(data.sensors).sort().forEach(sensor => {
                        const temp = data.sensors[sensor];
                        let statusClass  = 'status-normal';
                        let displayTemp  = temp === null ? '--.-' : temp.toFixed(1);

                        if (temp === null || temp >= tempCritical) {
                            statusClass = 'status-critical';
                        } else if (temp >= tempWarning) {
                            statusClass = 'status-warning';
                        }

                        container.innerHTML += `
                            <div class="card">
                                <h3>${sensor}</h3>
                                <div class="temp ${statusClass}">${displayTemp}&deg;F</div>
                            </div>`;
                    });
                }

                // Update watchdog indicator from same API response
                const wd = document.getElementById('watchdog-status');
                if (data.watchdog_active === true) {
                    wd.className = 'watchdog wd-active';
                    wd.innerHTML = '&#9679; Watchdog: active';
                } else if (data.watchdog_active === false) {
                    wd.className = 'watchdog wd-inactive';
                    wd.innerHTML = '&#9679; Watchdog: DISABLED';
                } else {
                    wd.className = 'watchdog wd-unknown';
                    wd.innerHTML = '&#9679; Watchdog: unknown';
                }
            })
            .catch(err => console.error('Failed to fetch current temps:', err));
    }

    function renderChart(data) {
        // Pivot flat SQLite rows (timestamp, sensor, temp) into per-sensor datasets
        const datasets  = {};
        const timestamps = new Set();

        data.forEach(row => {
            // SQLite stores UTC; append 'Z' so the browser converts to local time
            const label = new Date(row.timestamp.replace(' ', 'T') + 'Z')
                .toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            timestamps.add(label);

            if (!datasets[row.sensor_name]) datasets[row.sensor_name] = [];
            datasets[row.sensor_name].push(row.temperature_f);
        });

        const colors       = ['#2196f3', '#9c27b0', '#4caf50', '#ff9800'];
        const chartDatasets = Object.keys(datasets).map((sensor, i) => ({
            label:       sensor,
            data:        datasets[sensor],
            borderColor: colors[i % colors.length],
            fill:        false,
            tension:     0.1,
            pointRadius: 0
        }));

        const ctx = document.getElementById('historyChart').getContext('2d');
        if (historyChart) historyChart.destroy();

        historyChart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array.from(timestamps), datasets: chartDatasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: 'white' } } },
                scales: {
                    x: { ticks: { color: 'white', maxTicksLimit: window.innerWidth < 768 ? 6 : 24 } },
                    y: {
                        ticks: { color: 'white' },
                        title: { display: true, text: 'Temperature (°F)', color: 'white' }
                    }
                }
            }
        });
    }

    function fetchHistory() {
        fetch('/api/history')
            .then(r => r.json())
            .then(data => renderChart(data))
            .catch(err => console.error('Failed to fetch history:', err));
    }

    function toggleSystem(btn) {
        const body = document.getElementById('system-body');
        const arrow = document.getElementById('system-arrow');
        body.classList.toggle('open');
        arrow.innerHTML = body.classList.contains('open') ? '&#9650;' : '&#9660;';
    }

    function updateStatus() {
        fetch('/api/status')
            .then(r => r.json())
            .then(data => {
                // IPC age
                const ipcEl = document.getElementById('st-ipc');
                if (data.ipc_age_seconds === null) {
                    ipcEl.textContent = 'N/A';
                    ipcEl.className = 'stat-value stat-warn';
                } else {
                    const age = data.ipc_age_seconds;
                    ipcEl.textContent = age < 60 ? age + 's' :
                                        age < 3600 ? Math.floor(age/60) + 'm' :
                                        Math.floor(age/3600) + 'h';
                    ipcEl.className = age > 300 ? 'stat-value stat-crit' :
                                      age > 120  ? 'stat-value stat-warn' : 'stat-value';
                }

                // Last backup
                const bkEl = document.getElementById('st-backup');
                if (data.last_backup) {
                    const d = new Date(data.last_backup);
                    bkEl.textContent = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    bkEl.title = data.last_backup;
                    const hoursAgo = (Date.now() - d) / 3600000;
                    bkEl.className = hoursAgo > 8 ? 'stat-value stat-warn' : 'stat-value';
                } else {
                    bkEl.textContent = 'None yet';
                    bkEl.className = 'stat-value stat-warn';
                }

                // Disk usage
                const diskEl = document.getElementById('st-disk');
                if (data.data_disk_pct !== null) {
                    diskEl.textContent = data.data_disk_used_gb + ' / ' + data.data_disk_total_gb + ' GB';
                    diskEl.className = data.data_disk_pct > 90 ? 'stat-value stat-crit' :
                                       data.data_disk_pct > 75 ? 'stat-value stat-warn' : 'stat-value';
                } else {
                    diskEl.textContent = 'N/A';
                    diskEl.className = 'stat-value';
                }

                // Uptime
                document.getElementById('st-uptime').textContent = data.uptime || 'N/A';

                // CPU temperature
                const cpuEl = document.getElementById('st-cputemp');
                if (data.cpu_temp_c !== null && data.cpu_temp_c !== undefined) {
                    cpuEl.textContent = data.cpu_temp_c.toFixed(1) + '°C';
                    cpuEl.className = data.cpu_temp_c >= 80 ? 'stat-value stat-crit' :
                                      data.cpu_temp_c >= 70 ? 'stat-value stat-warn' : 'stat-value';
                } else {
                    cpuEl.textContent = 'N/A';
                    cpuEl.className = 'stat-value';
                }
            })
            .catch(err => console.error('Failed to fetch status:', err));
    }

    // Initial load
    updateCurrentTemps();
    fetchHistory();
    updateStatus();

    // Poll current temps every 30 s; refresh graph every 5 min (matches DB commit interval)
    setInterval(updateCurrentTemps, 30000);
    setInterval(fetchHistory,       300000);
    setInterval(updateStatus,        60000);   // status panel refreshes every 60 s
</script>

<div class="footer">IceboxHero v{{ version }}</div>
</body>
</html>
