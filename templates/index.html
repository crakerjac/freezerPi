<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freezer Monitor  v{{ version }}</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <style>
        body            { font-family: Arial, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; }
        h1              { margin-bottom: 20px; }
        .grid           { display: flex; gap: 20px; margin-bottom: 30px; }
        .card           { background-color: #1e1e1e; padding: 20px; border-radius: 8px; flex: 1; text-align: center; }
        .temp           { font-size: 4em; font-weight: bold; margin: 10px 0; }
        .status-normal  { color: #4caf50; }
        .status-warning { color: #ffeb3b; }
        .status-critical{ color: #f44336; }
        .chart-container{ background-color: #1e1e1e; padding: 20px; border-radius: 8px; height: 400px; }

        .footer         { margin-top: 20px; text-align: right; color: #555; font-size: 0.75em; }

        .footer         { margin-top: 30px; text-align: center; font-size: 0.75em; color: #555; }

        @media (max-width: 768px) {
            body            { padding: 12px; }
            .grid           { flex-direction: column; gap: 15px; }
            .temp           { font-size: 3.5em; }
            .chart-container{ height: 250px; padding: 12px; }
        }
    </style>
    <!-- Chart.js must be downloaded and placed at static/chart.min.js — no CDN used -->
    <script src="/static/chart.min.js"></script>
</head>
<body>

<h1>Freezer Status</h1>

<div class="grid" id="sensor-cards"></div>

<div class="chart-container">
    <canvas id="historyChart"></canvas>
</div>

<script>
    let historyChart = null;

    // Thresholds injected from config.ini via Jinja2 — no hardcoding required
    const tempWarning  = {{ warning }};
    const tempCritical = {{ critical }};

    function updateCurrentTemps() {
        fetch('/api/current')
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('sensor-cards');
                container.innerHTML = '';

                if (data.error && Object.keys(data.sensors).length === 0) {
                    container.innerHTML = `<div class="card"><h3>Status</h3><div class="temp">${data.error}</div></div>`;
                    return;
                }

                Object.keys(data.sensors).sort().forEach(sensor => {
                    const temp = data.sensors[sensor];
                    let statusClass  = 'status-normal';
                    let displayTemp  = temp === null ? '--.-' : temp.toFixed(1);

                    if (temp === null || temp >= tempCritical) {
                        statusClass = 'status-critical';
                    } else if (temp >= tempWarning) {
                        statusClass = 'status-warning';
                    }

                    container.innerHTML += `
                        <div class="card">
                            <h3>${sensor}</h3>
                            <div class="temp ${statusClass}">${displayTemp}&deg;F</div>
                        </div>`;
                });
            })
            .catch(err => console.error('Failed to fetch current temps:', err));
    }

    function renderChart(data) {
        // Pivot flat SQLite rows (timestamp, sensor, temp) into per-sensor datasets
        const datasets  = {};
        const timestamps = new Set();

        data.forEach(row => {
            // SQLite stores UTC; append 'Z' so the browser converts to local time
            const label = new Date(row.timestamp.replace(' ', 'T') + 'Z')
                .toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            timestamps.add(label);

            if (!datasets[row.sensor_name]) datasets[row.sensor_name] = [];
            datasets[row.sensor_name].push(row.temperature_f);
        });

        const colors       = ['#2196f3', '#9c27b0', '#4caf50', '#ff9800'];
        const chartDatasets = Object.keys(datasets).map((sensor, i) => ({
            label:       sensor,
            data:        datasets[sensor],
            borderColor: colors[i % colors.length],
            fill:        false,
            tension:     0.1,
            pointRadius: 0
        }));

        const ctx = document.getElementById('historyChart').getContext('2d');
        if (historyChart) historyChart.destroy();

        historyChart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array.from(timestamps), datasets: chartDatasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: 'white' } } },
                scales: {
                    x: { ticks: { color: 'white', maxTicksLimit: window.innerWidth < 768 ? 6 : 24 } },
                    y: {
                        ticks: { color: 'white' },
                        title: { display: true, text: 'Temperature (°F)', color: 'white' }
                    }
                }
            }
        });
    }

    function fetchHistory() {
        fetch('/api/history')
            .then(r => r.json())
            .then(data => renderChart(data))
            .catch(err => console.error('Failed to fetch history:', err));
    }

    // Initial load
    updateCurrentTemps();
    fetchHistory();

    // Poll current temps every 30 s; refresh graph every 5 min (matches DB commit interval)
    setInterval(updateCurrentTemps, 30000);
    setInterval(fetchHistory,       300000);
</script>
<div class="footer">FreezerPi v{{ version }}</div>
</body>
</html>
